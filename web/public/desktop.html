<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>施工日志 - 电脑端</title>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f5f5f5;
      --bg-glass: rgba(255, 255, 255, 0.8);
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #9b9b9b;
      --border: #e5e5e5;
      --border-light: #f0f0f0;
      --accent: #0067c0;
      --accent-hover: #1a76d2;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }
    
    [data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #252525;
      --bg-tertiary: #2d2d2d;
      --bg-glass: rgba(37, 37, 37, 0.85);
      --text-primary: #ffffff;
      --text-secondary: #b5b5b5;
      --text-tertiary: #858585;
      --border: #3a3a3a;
      --border-light: #303030;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.25);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }
    
    .taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      z-index: 1000;
      transition: background 0.3s;
    }
    
    .taskbar-icon {
      width: 44px;
      height: 40px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.2s;
      position: relative;
    }
    
    .taskbar-icon:hover { background: var(--bg-tertiary); }
    .taskbar-icon.active { background: var(--bg-tertiary); }
    .taskbar-icon.active::after {
      content: '';
      position: absolute;
      bottom: 2px;
      width: 16px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }
    
    .taskbar-right {
      position: absolute;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .main-container {
      flex: 1;
      display: flex;
      padding: 24px;
      padding-bottom: 80px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
      gap: 24px;
    }
    
    .sidebar {
      width: 280px;
      flex-shrink: 0;
    }
    
    .sidebar-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      margin-bottom: 20px;
      transition: background 0.3s, box-shadow 0.3s;
    }
    
    .sidebar-card:hover { box-shadow: var(--shadow-md); }
    
    .user-profile {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    
    .user-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--text-primary);
      font-weight: 600;
    }
    
    .user-info h3 { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .user-info p { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }
    
    .nav-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      margin-top: 20px;
    }
    
    .nav-section-title:first-child { margin-top: 0; }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
    }
    
    .nav-item:hover { background: var(--bg-tertiary); }
    .nav-item.active {
      background: var(--bg-tertiary);
      color: var(--accent);
    }
    
    .nav-item-icon { font-size: 20px; }
    .nav-item-label { font-size: 14px; font-weight: 500; }
    
    .content-area {
      flex: 1;
      min-width: 0;
    }
    
    .content-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      margin-bottom: 24px;
      transition: background 0.3s;
    }
    
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    
    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    
    .page-subtitle {
      font-size: 14px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }
    
    .action-btn {
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .action-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .action-btn-secondary {
      padding: 12px 24px;
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .action-btn-secondary:hover { background: var(--bg-tertiary); }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 28px;
    }
    
    .stat-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .stat-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    
    .stat-icon { font-size: 32px; margin-bottom: 12px; }
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }
    .stat-label {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-top: 8px;
      font-weight: 500;
    }
    
    .table-container { overflow-x: auto; }
    
    .log-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }
    
    .log-table th {
      text-align: left;
      padding: 14px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    
    .log-table td {
      padding: 16px;
      font-size: 14px;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-light);
      vertical-align: top;
    }
    
    .log-table tr:hover td { background: var(--bg-tertiary); }
    
    .log-date {
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .log-weather {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      font-size: 13px;
    }
    
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      font-size: 12px;
      margin: 2px;
      color: var(--text-secondary);
    }
    
    .tag-accent {
      background: var(--accent);
      color: white;
    }
    
    .hidden { display: none !important; }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    
    .modal {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.2s ease;
    }
    
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 28px;
      border-bottom: 1px solid var(--border-light);
    }
    
    .modal-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }
    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 20px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    
    .modal-body { padding: 28px; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 20px 28px;
      border-top: 1px solid var(--border-light);
    }
    
    .form-group { margin-bottom: 24px; }
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
      display: block;
    }
    .form-label .required { color: var(--accent); margin-left: 2px; }
    
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--accent);
      background: var(--bg-secondary);
      box-shadow: 0 0 0 4px rgba(0, 103, 192, 0.1);
    }
    
    .form-textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.6;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    
    .weather-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .weather-option {
      padding: 12px 20px;
      background: var(--bg-tertiary);
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .weather-option:hover { background: var(--bg-secondary); border-color: var(--border); }
    .weather-option.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .resource-section { margin-top: 24px; }
    
    .resource-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    
    .resource-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    
    .resource-list { display: flex; flex-direction: column; gap: 10px; }
    
    .resource-item {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      gap: 16px;
    }
    
    .resource-name { flex: 1; font-size: 14px; font-weight: 500; }
    
    .resource-counter {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 4px;
    }
    
    .resource-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--bg-tertiary);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: var(--text-primary);
    }
    
    .resource-btn:hover { background: var(--accent); color: white; }
    
    .resource-count {
      min-width: 28px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
    }
    
    .resource-delete {
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .resource-delete:hover { color: #e53935; }
    
    .resource-input-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    
    .resource-input {
      flex: 1;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
    }
    
    .resource-input:focus { border-color: var(--accent); }
    
    .stats-content { display: flex; gap: 24px; }
    
    .stats-main {
      flex: 1;
      min-width: 0;
    }
    
    .stats-sidebar { width: 320px; flex-shrink: 0; }
    
    .stats-tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      padding: 6px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      width: fit-content;
    }
    
    .stats-tab {
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-secondary);
    }
    
    .stats-tab:hover { color: var(--text-primary); }
    .stats-tab.active {
      background: var(--bg-secondary);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }
    
    .stats-chart {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      margin-bottom: 24px;
    }
    
    .stats-chart-title { font-size: 16px; font-weight: 600; margin-bottom: 24px; }
    
    .bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 18px;
    }
    
    .bar-label {
      width: 100px;
      font-size: 13px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    
    .bar-container {
      flex: 1;
      height: 28px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin: 0 16px;
    }
    
    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: var(--radius-sm);
      transition: width 0.5s ease;
    }
    
    .bar-value {
      width: 60px;
      text-align: right;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    
    .detail-block {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }
    
    .detail-block-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-tertiary);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
    }
    
    .detail-item:last-child { border-bottom: none; }
    
    .detail-item-label { font-size: 14px; color: var(--text-secondary); }
    .detail-item-value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    
    .toast {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 14px 28px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      z-index: 3000;
      animation: toastIn 0.3s ease;
      box-shadow: var(--shadow-lg);
    }
    
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    
    .picker-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 2500;
      backdrop-filter: blur(8px);
    }
    
    .picker {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 70vh;
      padding: 24px;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    
    .picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .picker-title { font-size: 18px; font-weight: 600; }
    
    .picker-cancel {
      font-size: 14px;
      color: var(--text-tertiary);
      cursor: pointer;
    }
    
    .picker-cancel:hover { color: var(--text-primary); }
    
    .picker-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .picker-option {
      padding: 12px 20px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .picker-option:hover { background: var(--accent); color: white; }
    
    .picker-custom {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border-light);
    }
    
    .picker-custom-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-tertiary);
      margin-bottom: 10px;
    }
    
    .picker-custom-row { display: flex; gap: 10px; }
    
    .picker-custom-input {
      flex: 1;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
    }
    
    .picker-custom-input:focus { border-color: var(--accent); }
    
    .picker-add-btn {
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    
    .login-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
    }
    
    [data-theme="dark"] .login-container {
      background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
    }
    
    .login-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 48px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--border-light);
    }
    
    .login-logo {
      font-size: 48px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .login-title {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      font-size: 14px;
      color: var(--text-tertiary);
      text-align: center;
      margin-bottom: 36px;
    }
    
    .login-input-group { margin-bottom: 20px; }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;

      filteredLogs.slice(0, 10).forEach((log, index) => {

      return map[weather] || '🌤️';
    }
    
    function updateStats() {

      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const weekStart = new Date(todayStart.getTime() - 6 * 24 * 60 * 60 * 1000);
      
      let todayCount = 0;
      let weekCount = 0;
      let todayWorkers = 0;
      
      logsList.forEach(log => {
        const logDate = new Date(log.date);
        if (logDate >= todayStart) {
          todayCount++;
          log.workers.forEach(w => todayWorkers += w.count);
        }
        if (logDate >= weekStart) {
          weekCount++;
        }
      });
      
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-week').textContent = weekCount;
      document.getElementById('stat-today').textContent = todayCount;
      document.getElementById('stat-workers').textContent = todayWorkers;
    }

      if (filter === 'all') {

          filterLabel.textContent = '本周日志';

    function switchStatsTab(tab) {
      currentStatsTab = tab;
      document.querySelectorAll('.stats-tab').forEach(t => t.classList.remove('active'));
      event.currentTarget.classList.add('active');
      updateStatsView();
    }
    
    function calculateStats(field) {
      const statsMap = {};
      logsList.forEach(log => {
        const items = log[field] || [];
        items.forEach(item => {
          if (!statsMap[item.name]) {
            statsMap[item.name] = { total: 0, count: 0, unit: item.unit };
          }
          statsMap[item.name].total += item.count || 0;
          statsMap[item.name].count++;
          statsMap[item.name].unit = item.unit;
        });
      });
      
      return Object.entries(statsMap)
        .map(([name, data]) => ({ name, ...data }))
        .sort((a, b) => b.total - a.total);
    }
    
    function updateStatsView() {
      const container = document.getElementById('stats-content');

        title = '材料使用统计';

          <div class="bar-row">
            <div class="bar-label">${item.name}</div>
            <div class="bar-container"><div class="bar-fill" style="width: ${width}%;"></div></div>
            <div class="bar-value">${item.total}${unit}</div>
          </div>
        `;
      });
      
      html += `</div>
        <div class="stats-chart">
          <h3 class="stats-chart-title">详细列表</h3>`;
      
      statsData.forEach((item, index) => {
        const unit = item.unit || unitLabel;
        html += `
          <div class="detail-item">
            <div>
              <span style="font-weight: 600;">${index + 1}.</span>
              <span style="margin-left: 8px;">${item.name}</span>
              <span class="tag" style="margin-left: 12px;">出现 ${item.count} 次</span>
            </div>
            <div class="detail-item-value">${item.total}${unit}</div>
          </div>
        `;
      });
      
      html += '</div>';
      container.innerHTML = html;
    }
    
    function showCreateModal() {
      workerList = [];
      materialList = [];
      equipmentList = [];
      selectedWeather = '晴';
      
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'create-modal';
      
      modal.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h2 class="modal-title">新建施工日志</h2>
            <button class="modal-close" onclick="closeCreateModal()">×</button>
          </div>
          <div class="modal-body">
            <div class="weather-info">
              <div class="weather-info-icon">☀️</div>
              <div class="weather-info-main">
                <div class="weather-info-temp" id="current-temp">--°C</div>
                <div class="weather-info-desc" id="current-weather">点击获取当前天气</div>
              </div>
              <button class="weather-refresh" onclick="fetchCurrentWeather()">📍 获取天气</button>
            </div>
            
            <div class="form-group">
              <label class="form-label">施工内容 <span class="required">*</span></label>
              <textarea id="log-content" class="form-textarea" placeholder="请输入今天的施工内容、进展情况、遇到的问题等..."></textarea>
            </div>
            
            <div class="form-group">
              <label class="form-label">天气情况</label>
              <div class="weather-options" id="weather-selector">
                ${['晴', '多云', '阴', '雨', '雪'].map(w => `
                  <div class="weather-option ${w === selectedWeather ? 'active' : ''}" onclick="selectWeather('${w}', this)">
                    ${getWeatherEmoji(w)} ${w}
                  </div>
                `).join('')}
              </div>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">温度 (°C)</label>
                <input type="number" id="log-temp" class="form-input" placeholder="如 28" value="">
              </div>
            </div>
            
            <div class="form-group">
              <div class="resource-header">
                <label class="resource-title">👷 施工人员</label>
                <button class="action-btn-secondary" style="padding: 8px 16px; font-size: 13px;" onclick="showWorkerPicker()">+ 添加</button>
              </div>
              <div id="create-worker-list" class="resource-list"></div>
            </div>
            
            <div class="form-group">
              <div class="resource-header">
                <label class="resource-title">🧱 材料使用</label>
                <button class="action-btn-secondary" style="padding: 8px 16px; font-size: 13px;" onclick="showMaterialPicker()">+ 添加</button>
              </div>
              <div id="create-material-list" class="resource-list"></div>
            </div>
            
            <div class="form-group">
              <div class="resource-header">
                <label class="resource-title">🚜 机械设备</label>
                <button class="action-btn-secondary" style="padding: 8px 16px; font-size: 13px;" onclick="showEquipmentPicker()">+ 添加</button>
              </div>
              <div id="create-equipment-list" class="resource-list"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="action-btn-secondary" onclick="closeCreateModal()">取消</button>
            <button class="action-btn" onclick="submitLog()">保存日志</button>
          </div>
        </div>
      `;
      
      document.body.appendChild(modal);
      modal.onclick = (e) => { if (e.target === modal) closeCreateModal(); };
      renderCreateWorkerList();
      renderCreateMaterialList();
      renderCreateEquipmentList();
    }
    
    function closeCreateModal() {
      document.getElementById('create-modal')?.remove();
    }
    
    function selectWeather(weather, el) {
      selectedWeather = weather;
      document.querySelectorAll('.weather-option').forEach(opt => opt.classList.remove('active'));
      el.classList.add('active');
    }
    
    function fetchCurrentWeather() {
      if (!navigator.geolocation) {
        showToast('浏览器不支持地理位置');
        return;
      }
      
      showToast('正在获取天气信息...');
      
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          try {
            const response = await fetch(
              `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&timezone=auto`
            );
            const data = await response.json();
            
            if (data.current) {
              const temp = Math.round(data.current.temperature_2m);
              const weatherCode = data.current.weather_code;
              const weatherDesc = getWeatherDescription(weatherCode);
              
              document.getElementById('current-temp').textContent = `${temp}°C`;
              document.getElementById('current-weather').textContent = weatherDesc;
              document.getElementById('log-temp').value = temp;
              
              selectedWeather = weatherDesc;
              document.querySelectorAll('.weather-option').forEach(opt => {
                if (opt.textContent.includes(weatherDesc)) {
                  document.querySelectorAll('.weather-option').forEach(o => o.classList.remove('active'));
                  opt.classList.add('active');
                }
              });
              
              showToast(`已获取当地天气：${weatherDesc} ${temp}°C`);
            }
          } catch (error) {
            showToast('获取天气失败，请手动选择');
          }
        },
        (error) => {
          showToast('位置获取失败，请手动选择');
        },
        { enableHighAccuracy: false, timeout: 10000, maximumAge: 300000 }
      );
    }
    
    function getWeatherDescription(code) {
      const weatherMap = {
        0: '晴', 1: '晴', 2: '多云', 3: '阴',
        45: '阴', 48: '阴', 51: '雨', 53: '雨', 55: '雨',
        56: '雨', 57: '雨', 61: '雨', 63: '雨', 65: '雨',
        66: '雨', 67: '雨', 71: '雪', 73: '雪', 75: '雪',
        77: '雪', 80: '雨', 81: '雨', 82: '雨', 85: '雪',
        86: '雪', 95: '雨', 96: '雨', 99: '雨'
      };
      return weatherMap[code] || '晴';
    }
    
    function renderCreateWorkerList() {
      const container = document.getElementById('create-worker-list');
      if (!container) return;
      
      if (workerList.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-tertiary); font-size: 13px;">暂无人员，点击上方添加</div>';
        return;
      }
      
      container.innerHTML = workerList.map((w, index) => `
        <div class="resource-item">
          <span class="resource-name">${w.name}</span>
          <div class="resource-counter">
            <button class="resource-btn" onclick="updateWorkerCount(${index}, -1)">-</button>
            <span class="resource-count">${w.count}</span>
            <button class="resource-btn" onclick="updateWorkerCount(${index}, 1)">+</button>
          </div>
          <button class="resource-delete" onclick="removeWorker(${index})">删除</button>
        </div>
      `).join('');
    }
    
    function renderCreateMaterialList() {
      const container = document.getElementById('create-material-list');
      if (!container) return;
      
      if (materialList.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-tertiary); font-size: 13px;">暂无材料，点击上方添加</div>';
        return;
      }
      
      container.innerHTML = materialList.map((m, index) => `
        <div class="resource-item">
          <span class="resource-name">${m.name}</span>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="number" class="resource-input" style="width: 80px;" value="${m.count}" onchange="updateMaterialCount(${index}, this.value)" placeholder="数量">
            <span style="font-size: 13px; color: var(--text-tertiary);">${m.unit}</span>
          </div>
          <button class="resource-delete" onclick="removeMaterial(${index})">删除</button>
        </div>
      `).join('');
    }
    
    function renderCreateEquipmentList() {
      const container = document.getElementById('create-equipment-list');
      if (!container) return;
      
      if (equipmentList.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-tertiary); font-size: 13px;">暂无机械，点击上方添加</div>';
        return;
      }
      
      container.innerHTML = equipmentList.map((e, index) => `
        <div class="resource-item">
          <span class="resource-name">${e.name}</span>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="number" class="resource-input" style="width: 80px;" value="${e.count}" onchange="updateEquipmentCount(${index}, this.value)" placeholder="数量">
            <span style="font-size: 13px; color: var(--text-tertiary);">${e.unit}</span>
          </div>
          <button class="resource-delete" onclick="removeEquipment(${index})">删除</button>
        </div>
      `).join('');
    }
    
    function updateWorkerCount(index, delta) {
      workerList[index].count = Math.max(1, workerList[index].count + delta);
      renderCreateWorkerList();
    }
    
    function updateMaterialCount(index, value) {
      materialList[index].count = Math.max(0, parseInt(value) || 0);
    }
    
    function updateEquipmentCount(index, value) {
      equipmentList[index].count = Math.max(0, parseInt(value) || 0);
    }
    
    function removeWorker(index) {
      workerList.splice(index, 1);
      renderCreateWorkerList();
    }
    
    function removeMaterial(index) {
      materialList.splice(index, 1);
      renderCreateMaterialList();
    }
    
    function removeEquipment(index) {
      equipmentList.splice(index, 1);
      renderCreateEquipmentList();
    }
    
    function showWorkerPicker() {
      const picker = document.createElement('div');
      picker.className = 'picker-overlay';
      picker.id = 'worker-picker';
      
      picker.innerHTML = `
        <div class="picker">
          <div class="picker-header">
            <span class="picker-cancel" onclick="document.getElementById('worker-picker').remove()">取消</span>
            <span class="picker-title">选择人员类型</span>
            <span class="picker-cancel">确定</span>
          </div>
          <div class="picker-options">
            ${workerOptions.map(name => {
              const existing = workerList.find(w => w.name === name);
              return `<div class="picker-option" onclick="addWorker('${name}')">${name}${existing ? ' (已添加)' : ''}</div>`;
            }).join('')}
          </div>
          <div class="picker-custom">
            <div class="picker-custom-label">自定义工种</div>
            <div class="picker-custom-row">
              <input type="text" id="custom-worker-input" class="picker-custom-input" placeholder="输入自定义工种名称">
              <button class="picker-add-btn" onclick="addCustomWorker()">添加</button>
            </div>
          </div>
        </div>
      `;
      
      document.body.appendChild(picker);
      picker.onclick = (e) => { if (e.target === picker) picker.remove(); };
    }
    
    function addWorker(name) {
      const existing = workerList.find(w => w.name === name);
      if (existing) {
        showToast('该工种已添加');
        return;
      }
      workerList.push({ name, count: 1 });
      renderCreateWorkerList();
      document.getElementById('worker-picker').remove();
    }
    
    function addCustomWorker() {
      const input = document.getElementById('custom-worker-input');
      const name = input.value.trim();
      if (!name) {
        showToast('请输入工种名称');
        return;
      }
      
      const existing = workerList.find(w => w.name === name);
      if (existing) {
        showToast('该工种已添加');
        return;
      }
      
      workerList.push({ name, count: 1 });
      if (!workerOptions.includes(name)) {
        workerOptions.push(name);
      }
      renderCreateWorkerList();
      document.getElementById('worker-picker').remove();
      showToast(`已添加：${name}`);
    }
    
    function showMaterialPicker() {
      const picker = document.createElement('div');
      picker.className = 'picker-overlay';
      picker.id = 'material-picker';
      
      picker.innerHTML = `
        <div class="picker">
          <div class="picker-header">
            <span class="picker-cancel" onclick="document.getElementById('material-picker').remove()">取消</span>
            <span class="picker-title">选择材料</span>
            <span class="picker-cancel">确定</span>
          </div>
          <div class="picker-options">
            ${materialOptions.map(m => {
              const existing = materialList.find(item => item.name === m.name);
              return `<div class="picker-option" onclick="addMaterial('${m.name}', '${m.unit}')">${m.name}${existing ? ' (已添加)' : ''}</div>`;
            }).join('')}
          </div>
          <div class="picker-custom">
            <div class="picker-custom-label">自定义材料</div>
            <div class="picker-custom-row">
              <input type="text" id="custom-material-name" class="picker-custom-input" placeholder="材料名称" style="flex: 2;">
              <input type="text" id="custom-material-unit" class="picker-custom-input" placeholder="单位" style="width: 100px;">
              <button class="picker-add-btn" onclick="addCustomMaterial()">添加</button>
            </div>
          </div>
        </div>
      `;
      
      document.body.appendChild(picker);
      picker.onclick = (e) => { if (e.target === picker) picker.remove(); };
    }
    
    function addMaterial(name, unit) {
      const existing = materialList.find(m => m.name === name);
      if (existing) {
        showToast('该材料已添加');
        return;
      }
      materialList.push({ name, count: 0, unit });
      renderCreateMaterialList();
      document.getElementById('material-picker').remove();
    }
    
    function addCustomMaterial() {
      const nameInput = document.getElementById('custom-material-name');
      const unitInput = document.getElementById('custom-material-unit');
      const name = nameInput.value.trim();
      const unit = unitInput.value.trim() || '个';
      
      if (!name) {
        showToast('请输入材料名称');
        return;
      }
      
      const existing = materialList.find(m => m.name === name);
      if (existing) {
        showToast('该材料已添加');
        return;
      }
      
      materialList.push({ name, count: 0, unit });
      if (!materialOptions.find(m => m.name === name)) {
        materialOptions.push({ name, unit });
      }
      renderCreateMaterialList();
      document.getElementById('material-picker').remove();
      showToast(`已添加：${name}`);
    }
    
    function showEquipmentPicker() {
      const picker = document.createElement('div');
      picker.className = 'picker-overlay';
      picker.id = 'equipment-picker';
      
      picker.innerHTML = `
        <div class="picker">
          <div class="picker-header">
            <span class="picker-cancel" onclick="document.getElementById('equipment-picker').remove()">取消</span>
            <span class="picker-title">选择机械</span>
            <span class="picker-cancel">确定</span>
          </div>
          <div class="picker-options">
            ${equipmentOptions.map(e => {
              const existing = equipmentList.find(item => item.name === e.name);
              return `<div class="picker-option" onclick="addEquipment('${e.name}', '${e.unit}')">${e.name}${existing ? ' (已添加)' : ''}</div>`;
            }).join('')}
          </div>
          <div class="picker-custom">
            <div class="picker-custom-label">自定义机械</div>
            <div class="picker-custom-row">
              <input type="text" id="custom-equipment-name" class="picker-custom-input" placeholder="机械名称" style="flex: 2;">
              <input type="text" id="custom-equipment-unit" class="picker-custom-input" placeholder="单位" style="width: 100px;">
              <button class="picker-add-btn" onclick="addCustomEquipment()">添加</button>
            </div>
          </div>
        </div>
      `;
      
      document.body.appendChild(picker);
      picker.onclick = (e) => { if (e.target === picker) picker.remove(); };
    }
    
    function addEquipment(name, unit) {
      const existing = equipmentList.find(e => e.name === name);
      if (existing) {
        showToast('该机械已添加');
        return;
      }
      equipmentList.push({ name, count: 0, unit });
      renderCreateEquipmentList();
      document.getElementById('equipment-picker').remove();
    }
    
    function addCustomEquipment() {
      const nameInput = document.getElementById('custom-equipment-name');
      const unitInput = document.getElementById('custom-equipment-unit');
      const name = nameInput.value.trim();
      const unit = unitInput.value.trim() || '台';
      
      if (!name) {
        showToast('请输入机械名称');
        return;
      }
      
      const existing = equipmentList.find(e => e.name === name);
      if (existing) {
        showToast('该机械已添加');
        return;
      }
      
      equipmentList.push({ name, count: 0, unit });
      if (!equipmentOptions.find(e => e.name === name)) {
        equipmentOptions.push({ name, unit });
      }
      renderCreateEquipmentList();
      document.getElementById('equipment-picker').remove();
      showToast(`已添加：${name}`);
    }
    
    function submitLog() {
      const content = document.getElementById('log-content').value;
      const temp = parseInt(document.getElementById('log-temp').value) || 25;
      
      if (!content.trim()) {
        showToast('请填写施工内容');
        return;
      }
      
      const newLog = {
        id: logsList.length + 1,
        date: new Date(),
        weather: selectedWeather,
        temperature: temp,
        content: content,
        workers: [...workerList],
        materials: [...materialList],
        equipment: [...equipmentList]
      };
      
      logsList.unshift(newLog);
      
      showToast('日志已保存');
      closeCreateModal();
      updateLogs();
      updateStats();
    }
    
    function showLogDetail(index) {
      const log = logsList[index];
      if (!log) return;
      
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.id = 'detail-modal';
      
      const workersHtml = log.workers.length > 0 
        ? log.workers.map(w => `${w.name} ×${w.count}`).join('、')
        : '无';
      
      const materialsHtml = log.materials.length > 0
        ? log.materials.map(m => `<div class="detail-item"><span class="detail-item-label">${m.name}</span><span class="detail-item-value">${m.count}${m.unit}</span></div>`).join('')
        : '<div class="detail-item"><span class="detail-item-label">暂无材料</span></div>';
      
      const equipmentHtml = log.equipment.length > 0
        ? log.equipment.map(e => `<div class="detail-item"><span class="detail-item-label">${e.name}</span><span class="detail-item-value">${e.count}${e.unit}</span></div>`).join('')
        : '<div class="detail-item"><span class="detail-item-label">暂无机械</span></div>';
      
      modal.innerHTML = `
        <div class="modal" style="max-width: 700px;">
          <div class="modal-header">
            <h2 class="modal-title">日志详情</h2>
            <button class="modal-close" onclick="document.getElementById('detail-modal').remove()">×</button>
          </div>
          <div class="modal-body">
            <div class="detail-block" style="margin-bottom: 24px;">
              <div class="detail-block-title">基本信息</div>
              <div class="detail-item">
                <span class="detail-item-label">日期</span>
                <span class="detail-item-value">${formatDisplayDate(log.date)}</span>
              </div>
              <div class="detail-item">
                <span class="detail-item-label">天气</span>
                <span class="detail-item-value">${getWeatherEmoji(log.weather)} ${log.weather} ${log.temperature}°C</span>
              </div>
              <div class="detail-item">
                <span class="detail-item-label">施工人员</span>
                <span class="detail-item-value">${workersHtml}</span>
              </div>
            </div>
            
            <div class="detail-block" style="margin-bottom: 24px;">
              <div class="detail-block-title">施工内容</div>
              <div style="font-size: 15px; line-height: 1.8; color: var(--text-primary);">
                ${log.content}
              </div>
            </div>
            
            <div class="detail-grid">
              <div class="detail-block">
                <div class="detail-block-title">材料使用</div>
                ${materialsHtml}
              </div>
              <div class="detail-block">
                <div class="detail-block-title">机械设备</div>
                ${equipmentHtml}
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="action-btn-secondary" onclick="document.getElementById('detail-modal').remove()">关闭</button>
          </div>
        </div>
      `;
      
      document.body.appendChild(modal);
      modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    function toggleTheme() {
      const body = document.body;
      const isDark = body.getAttribute('data-theme') === 'dark';
      body.setAttribute('data-theme', isDark ? 'light' : 'dark');
      
      const icon = document.getElementById('theme-icon');
      const label = document.getElementById('theme-label');
      if (icon && label) {
        icon.textContent = isDark ? '🌙' : '☀️';
        label.textContent = isDark ? '深色模式' : '浅色模式';
      }
    }
    
    function showToast(message) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.remove(), 2500);
    }
    
    function updateTaskbarTime() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const el = document.getElementById('taskbar-time');
      if (el) el.textContent = `${hours}:${minutes}`;
    }
  </script>
</body>
